<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Database Taman Indonesia - Absolute Link Fix</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-firestore-compat.js"></script>

    <style>
        :root { --primary: #2ecc71; --secondary: #f1c40f; --dark: #050a05; --card-bg: #0d140d; --danger: #e74c3c; }
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--dark); color: #e0e0e0; }
        header { background: rgba(7, 15, 7, 0.95); padding: 15px 5%; position: fixed; width: 100%; top: 0; z-index: 2000; border-bottom: 2px solid var(--secondary); text-align: center; backdrop-filter: blur(10px); }
        .hero { height: 35vh; margin-top: 50px; background: linear-gradient(rgba(0,0,0,0.8), rgba(0,0,0,0.8)), url('https://images.unsplash.com/photo-1441974231531-c6227db76b6e?auto=format&fit=crop&q=80&w=1200'); background-size: cover; background-position: center; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        #digitalClock { color: var(--primary); font-size: 2.2rem; font-weight: bold; text-shadow: 0 0 15px var(--primary); font-family: monospace; }
        .container { max-width: 1400px; margin: 20px auto; padding: 20px; }
        .search-bar { width: 100%; max-width: 700px; padding: 18px 30px; border-radius: 50px; border: 2px solid var(--primary); background: #121d12; color: white; margin: 0 auto 30px auto; display: block; outline:none; }
        .stats-bar { display: flex; gap: 15px; margin-bottom: 25px; flex-wrap: wrap; }
        .stat-box { background: var(--card-bg); padding: 15px; border-radius: 12px; border-left: 5px solid var(--primary); flex: 1; min-width: 200px; border: 1px solid #222; }
        .taman-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 25px; }
        .card { background: var(--card-bg); border: 1px solid #222; padding: 25px; border-radius: 15px; transition: 0.3s; cursor: pointer; }
        .card:hover { border-color: var(--primary); transform: translateY(-8px); background: #152215; }
        .card h3 { color: var(--primary); margin: 8px 0; font-size: 1.1rem; }
        
        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); display: none; justify-content: center; align-items: center; z-index: 3000; padding: 10px; }
        .modal-content { background: #0d1a0d; width: 100%; max-width: 500px; padding: 30px; border-radius: 20px; border: 1px solid var(--primary); max-height: 90vh; overflow-y: auto; }
        .tab-header { display: flex; gap: 15px; border-bottom: 1px solid #222; margin: 20px 0; }
        .tab-btn { background: none; border: none; padding: 10px; color: #666; cursor: pointer; font-weight: bold; }
        .tab-btn.active { color: var(--primary); border-bottom: 3px solid var(--primary); }
        .tab-body { color: #bbb; line-height: 1.8; min-height: 150px; }
        
        .btn-add { background: var(--secondary); color: #000; padding: 15px; width: 100%; font-weight: bold; cursor: pointer; display: none; margin-bottom: 25px; border: none; border-radius: 10px; }
        .admin-actions { display: none; margin-top: 25px; gap: 10px; border-top: 1px solid #333; padding-top: 20px; }
        .btn-edit { flex:1; padding:12px; background:var(--primary); border:none; border-radius:8px; font-weight:bold; color:#000; cursor:pointer; }
        .btn-delete { flex:1; padding:12px; background:var(--danger); border:none; border-radius:8px; color:white; font-weight:bold; color:white; cursor:pointer; }
        
        input, textarea { width: 100%; padding: 14px; margin: 10px 0; background: #050a05; color: #fff; border: 1px solid var(--primary); border-radius: 8px; outline: none; }
        textarea { height: 120px; }

        .contact-section { background: #081208; padding: 60px 20px; text-align: center; border-top: 2px solid #111; margin-top: 50px; }
        .contact-card { max-width: 600px; margin: 0 auto; background: var(--card-bg); padding: 40px; border-radius: 20px; border: 1px solid var(--primary); }
        .btn-mail { display: inline-block; background: var(--primary); color: #000; padding: 15px 40px; border-radius: 50px; text-decoration: none; font-weight: bold; margin-top: 25px; transition: 0.3s; }

        footer { background: #000; padding: 30px; text-align: center; color: #444; border-top: 1px solid #222; }
    </style>
</head>
<body>

<header><div style="color:var(--secondary); font-weight:bold;">🌿TAMAN KOTA INDONESIA🇮🇩</div></header>

<section class="hero">
    <div id="digitalClock">00:00:00</div>
    <button onclick="loginAdmin()" id="loginBtn" style="background:none; border:1px solid var(--primary); color:var(--primary); padding:8px 20px; border-radius:20px; cursor:pointer; margin-top:15px; font-weight:bold;">ADMIN LOGIN</button>
</section>

<div class="container">
    <button class="btn-add" id="btnAdd" onclick="showEditor()">+ TAMBAH DATA TAMAN KE CLOUD</button>
    <input type="text" id="searchInput" class="search-bar" placeholder="Cari nama taman..." onkeyup="render()">
    
    <div class="stats-bar">
        <div class="stat-box">STATUS: <span style="color:var(--primary); font-weight:bold;">upgrade v19.14</span></div>
        <div class="stat-box">TOTAL DATA: <span id="count" style="color:var(--secondary); font-weight:bold;">0</span></div>
    </div>

    <div id="mainGrid" class="taman-grid"></div>
    <button id="loadMore" onclick="limit += 30; render()" style="width:100%; padding:20px; background:none; border:1px dashed var(--primary); color:var(--primary); cursor:pointer; margin-top:30px; border-radius:15px; font-weight:bold;">MUAT LAINNYA</button>
</div>

<section class="contact-section">
    <div class="contact-card">
        <h2 style="color:var(--secondary)">KONTAK KAMI</h2>
        <p style="margin-top:10px; color:#aaa;">Hubungi Tim Kami</p>
        <a href="mailto:bibixse@gmail.com" class="btn-mail">KIRIM EMAIL</a>
    </div>
</section>

<div id="detailModal" class="modal" onclick="closeDetail()">
    <div class="modal-content" onclick="event.stopPropagation()">
        <h2 id="d-name" style="color:var(--primary)">Nama Taman</h2>
        <div id="d-rate" style="color:var(--secondary); font-size: 1.5rem; margin: 10px 0; font-weight:bold;">⭐ 0.0</div>
        <div class="tab-header">
            <button class="tab-btn active" id="btn-desc" onclick="switchTab('desc')">DESKRIPSI</button>
            <button class="tab-btn" id="btn-addr" onclick="switchTab('addr')">LOKASI & NAVIGASI</button>
        </div>
        <div id="tab-desc" class="tab-body"></div>
        <div id="tab-addr" class="tab-body" style="display:none;"></div>
        <div id="admin-actions" class="admin-actions">
            <button class="btn-edit" id="btnEditAct">EDIT</button>
            <button class="btn-delete" id="btnDelAct">HAPUS</button>
        </div>
    </div>
</div>

<div id="editorModal" class="modal">
    <div class="modal-content">
        <h2 id="editorTitle" style="color:var(--secondary)">Editor Database</h2>
        <input type="hidden" id="f-id">
        <input type="text" id="f-name" placeholder="Nama Taman">
        <input type="text" id="f-loc" placeholder="Alamat Spesifik">
        <input type="text" id="f-maps" placeholder="Link Kustom (Contoh: google.com)">
        <input type="text" id="f-btnname" placeholder="Nama Tombol (Contoh: Navigasi)">
        <input type="number" id="f-rate" step="0.1" max="5" placeholder="Rating (1.0 - 5.0)">
        <textarea id="f-desc" placeholder="Tulis deskripsi detail taman..."></textarea>
        <button onclick="saveData()" style="width:100%; padding:15px; background:var(--primary); color:#000; font-weight:bold; border:none; border-radius:10px; cursor:pointer; margin-top:15px;">SIMPAN KE CLOUD</button>
        <button onclick="document.getElementById('editorModal').style.display='none'" style="width:100%; padding:10px; background:none; color:#777; border:none; cursor:pointer;">BATALKAN</button>
    </div>
</div>

<footer>© 2026 Taman Kota Indonesia | Developed by AKB Aldo Kazami Bibixse</footer>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyDRi02GsLASvx7CIw2wXbx_nNi8uCLoLQA",
        authDomain: "taman-kota-78ca2.firebaseapp.com",
        projectId: "taman-kota-78ca2",
        storageBucket: "taman-kota-78ca2.firebasestorage.app",
        messagingSenderId: "466270484387",
        appId: "1:466270484387:web:8380533506588a0832cc16"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    let allData = [];
    let isAdmin = false;
    let limit = 30;
    let currentId = null;

    function loadData() {
        db.collection("taman").onSnapshot(snap => {
            let fireDb = [];
            snap.forEach(doc => fireDb.push({ id: doc.id, ...doc.data() }));

            const cities = ["Jakarta", "Surabaya", "Bandung", "Medan", "Makassar"];
            let generatedDb = [];
            for(let i=1; i<=55120; i++) {
                generatedDb.push({
                    id: "ri-"+i, 
                    n: "Taman " + cities[i % cities.length] + " " + i, 
                    l: `Jl. Ahmad Yani No.${i % 100}, Kota ${cities[i % cities.length]}`, 
                    r: parseFloat((Math.random() * 1.5 + 3.5).toFixed(1)),
                    d: "Fasilitas publik hijau asli Indonesia."
                });
            }
            allData = [...fireDb, ...generatedDb].sort((a,b) => b.r - a.r);
            document.getElementById('count').innerText = allData.length.toLocaleString();
            render();
        });
    }

    function render() {
        let h = "";
        const q = document.getElementById('searchInput').value.toLowerCase();
        const filtered = allData.filter(x => x.n.toLowerCase().includes(q) || x.l.toLowerCase().includes(q));
        filtered.slice(0, limit).forEach(t => {
            h += `<div class="card" onclick="openDetail('${t.id}')">
                <small>📍 ${t.l.substring(0, 35)}...</small>
                <h3>${t.n}</h3>
                <b style="color:var(--secondary)">⭐ ${t.r.toFixed(1)}</b>
            </div>`;
        });
        document.getElementById('mainGrid').innerHTML = h;
    }

    function openDetail(id) {
        currentId = id;
        const t = allData.find(x => x.id === id);
        if(!t) return;

        document.getElementById('d-name').innerText = t.n;
        document.getElementById('d-rate').innerText = "⭐ " + t.r.toFixed(1);
        document.getElementById('tab-desc').innerHTML = t.d ? t.d.replace(/\n/g, '<br>') : "Deskripsi belum ada.";
        
        // --- LOGIKA ANTI MENTAL & REFRESH ---
        let finalLink = "";
        let inputLink = (t.m || "").trim();

        if (inputLink.length > 3) {
            // Jika lu lupa kasih https://, sistem tambahin otomatis biar nggak refresh
            if (!inputLink.startsWith('http')) {
                finalLink = 'https://' + inputLink;
            } else {
                finalLink = inputLink;
            }
        } else {
            // Default ke Google Maps kalau link kustom kosong
            finalLink = "https://www.google.com/maps/search/" + encodeURIComponent(t.n + " " + t.l);
        }
        
        let finalBtnName = (t.bn && t.bn.trim() !== "") ? t.bn : "🌐 BUKA NAVIGASI GOOGLE MAPS";

        document.getElementById('tab-addr').innerHTML = `
            <strong>ALAMAT:</strong><br>${t.l}<br><br>
            <a href="${finalLink}" target="_blank" style="padding:15px; background:#4285F4; color:white; text-decoration:none; border-radius:10px; font-weight:bold; display:inline-block; width:100%; text-align:center;">${finalBtnName}</a>
        `;

        const adminBox = document.getElementById('admin-actions');
        if(isAdmin && !id.startsWith('ri-')) {
            adminBox.style.display = 'flex';
            document.getElementById('btnEditAct').onclick = () => editData();
            document.getElementById('btnDelAct').onclick = () => deleteData();
        } else {
            adminBox.style.display = 'none';
        }
        switchTab('desc');
        document.getElementById('detailModal').style.display = 'flex';
    }

    function switchTab(type) {
        document.getElementById('tab-desc').style.display = type === 'desc' ? 'block' : 'none';
        document.getElementById('tab-addr').style.display = type === 'addr' ? 'block' : 'none';
        document.getElementById('btn-desc').className = 'tab-btn' + (type === 'desc' ? ' active' : '');
        document.getElementById('btn-addr').className = 'tab-btn' + (type === 'addr' ? ' active' : '');
    }

    function showEditor() {
        document.getElementById('f-id').value = "";
        document.getElementById('f-name').value = "";
        document.getElementById('f-loc').value = "";
        document.getElementById('f-maps').value = ""; 
        document.getElementById('f-btnname').value = ""; 
        document.getElementById('f-rate').value = "";
        document.getElementById('f-desc').value = "";
        document.getElementById('editorModal').style.display = 'flex';
    }

    function editData() {
        const t = allData.find(x => x.id === currentId);
        document.getElementById('f-id').value = t.id;
        document.getElementById('f-name').value = t.n;
        document.getElementById('f-loc').value = t.l;
        document.getElementById('f-maps').value = t.m || ""; 
        document.getElementById('f-btnname').value = t.bn || ""; 
        document.getElementById('f-rate').value = t.r;
        document.getElementById('f-desc').value = t.d || "";
        document.getElementById('detailModal').style.display = 'none';
        document.getElementById('editorModal').style.display = 'flex';
    }

    function saveData() {
        const id = document.getElementById('f-id').value;
        const data = {
            n: document.getElementById('f-name').value,
            l: document.getElementById('f-loc').value,
            m: document.getElementById('f-maps').value,
            bn: document.getElementById('f-btnname').value,
            r: parseFloat(document.getElementById('f-rate').value) || 0,
            d: document.getElementById('f-desc').value
        };
        if(id) db.collection("taman").doc(id).update(data).then(() => { alert("Update Berhasil!"); document.getElementById('editorModal').style.display = 'none'; });
        else db.collection("taman").add(data).then(() => { alert("Tambah Berhasil!"); document.getElementById('editorModal').style.display = 'none'; });
    }

    function deleteData() {
        if(confirm("Hapus Permanen?")) db.collection("taman").doc(currentId).delete().then(() => { alert("Terhapus!"); closeDetail(); });
    }

    function loginAdmin() {
        const u = prompt("User:"), p = prompt("Pass:");
        if(btoa(u) === "YmliaXhzZQ==" && btoa(p) === "YmliaXhzZTExcXFhYQ==") {
            isAdmin = true;
            document.getElementById('btnAdd').style.display = 'block';
            alert("Akses Admin Aktif!");
            render();
        }
    }

    function closeDetail() { document.getElementById('detailModal').style.display = 'none'; }
    setInterval(() => { document.getElementById('digitalClock').innerText = new Date().toLocaleTimeString(); }, 1000);
    window.onload = loadData;
</script>
</body>
</html>
